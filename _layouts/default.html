<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% feed_meta %}
    <title>{% if page.title %}{{ page.title }} - {% endif %}emailaddress.horse</title>
    <link rel="stylesheet" type="text/css" href="/styles.css">
    <link rel="micropub" href="https://horse-api.herokuapp.com/micropub/main">
    <link rel="authorization_endpoint" href="https://indieauth.com/auth">
    <link rel="token_endpoint" href="https://tokens.indieauth.com/token">
    {% if jekyll.environment == "production" %}
      <script
        async
        defer
        data-domain="emailaddress.horse"
        src="https://stats.emailaddress.horse/js/index.js"
      ></script>
    {% endif %}
  </head>
  <body>
    <div class="container">
      <header>
        <a href="{{ site.url }}">emailaddress.horse</a>
      </header>

      <main>
        {{ content }}
      </main>

      <footer>
        <hr/>
        <a href="https://twitter.com/jdbannister">@jdbannister</a>
      </footer>
    </div>
  </body>
</html>
