---
layout: default
---

<header>
  <h1>{{ page.title }}</h1>
  <small>
    {{ page.date | date_to_long_string: "ordinal" }}
  </small>
</header>

{{ content }}

{% if page.games %}
<footer class="c-grey p-grey">
  <small>
    Referenced games:

    {% for path in page.games %}
    {% assign game = site.games | find: "path", path %}
    <a href="/games#{{ game.slug }}">{{ game.title }}</a>
    {% endfor %}
  </small>
</footer>
{% endif %}
