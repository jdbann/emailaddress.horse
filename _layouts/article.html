---
layout: default
---
<h1>{{ page.title }}</h1>
<small>
  {{ page.date | date_to_long_string: "ordinal" }}
  {% if page.categories != empty %}
    |
    {% for category in page.categories %}
      <a href="/categories#{{ category | slugify }}">{{ category | capitalize }}</a>
    {% endfor %}
  {% endif %}
</small>

{{ content }}
