---
layout: default
---
<h1>{{ page.title }}</h1>
<small>
  {{ page.date | date_to_long_string: "ordinal" }}
  {% if page.categories != empty %}
    |
    {% for category in page.categories %}
      <a href="/categories#{{ category | slugify }}">{{ category }}</a>
    {% endfor %}
  {% endif %}
  {% if page.source != nil %}
    |
    <a href="{{ page.source }}">Original source</a>
  {% endif %}
</small>

{{ content }}
